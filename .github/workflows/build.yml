name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: temurin

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload API Artifact
      uses: actions/upload-artifact@v7
      with:
        name: simplefreeze-api
        path: api/build/libs/simplefreeze-api-*.jar

    - name: Upload Plugin Artifact
      uses: actions/upload-artifact@v7
      with:
        name: simplefreeze-plugin
        path: plugin/build/libs/simplefreeze-plugin-*.jar

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: temurin

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@v6
