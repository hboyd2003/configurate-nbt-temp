name: Release

on:
  push:
    tags: [ 'v*.*.**' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: temurin

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Build Changelog
      uses: mikepenz/release-changelog-builder-action@v6
      with:
        mode: COMMIT
        ignorePreReleases: true
        configurationJson: |
          {
            "template": "#{{CHANGELOG}}",
            "categories": [
              {
                  "title": "## New Features",
                  "labels": ["feat"]
              },
              {
                  "title": "## Bug Fixes",
                  "labels": ["fix"]
              },
              {
                  "title": "## Other Changes",
                  "labels": []
              }
            ],
            "label_extractor": [
              {
                "pattern": "^(build|chore|ci|docs|feat|fix|rem|perf|refactor|revert|style|test){1}(\\([\\w\\-\\.]+\\))?(!)?: ([\\w ])+([\\s\\S]*)",
                "on_property": "title",
                "target": "$1"
              }
            ]
          }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        body: ${{ steps.build_changelog.outputs.changelog }}
        draft: true
        prerelease: ${{ endsWith(github.ref_name, '-SNAPSHOT') }}
        files: |
          api/build/libs/simplefreeze-api-*.jar
          plugin/build/libs/simplefreeze-plugin-*.jar